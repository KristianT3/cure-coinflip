<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CuRe Coin Flip</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:#0b0b0b;
  color:white;
  font-family:Arial, Helvetica, sans-serif;
  text-align:center;
}

h1{margin-bottom:5px;}
p{opacity:.7;}

.scene{
  perspective:1000px;
  width:240px;
  height:240px;
  margin:30px 0;
}

.coin{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 2s ease-in-out;
}

.face{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  backface-visibility:hidden;
}

/* HEADS - WHITE */
.heads{
  background:#ffffff;
  transform:rotateY(0deg) translateZ(10px);
}

/* TAILS - BLACK */
.tails{
  background:#000000;
  transform:rotateY(180deg) translateZ(10px);
}

/* Fix mirrored logo */
.tails img{
  transform:scaleX(-1);
}

.face img{
  width:70%;
}

.glow-white{
  animation:pulseWhite 1.6s infinite;
}

.glow-blue{
  animation:pulseBlue 1.6s infinite;
}

@keyframes pulseWhite{
  0%{box-shadow:0 0 10px rgba(255,255,255,.6);}
  50%{box-shadow:0 0 40px rgba(255,255,255,1);}
  100%{box-shadow:0 0 10px rgba(255,255,255,.6);}
}

@keyframes pulseBlue{
  0%{box-shadow:0 0 10px rgba(0,200,255,.6);}
  50%{box-shadow:0 0 40px rgba(0,200,255,1);}
  100%{box-shadow:0 0 10px rgba(0,200,255,.6);}
}

button{
  margin:5px;
  padding:10px 15px;
  border-radius:8px;
  border:1px solid #444;
  background:#111;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#222;
}
</style>
</head>

<body>

<h1>CuRe Clan — Tournament Coin Flip</h1>
<p>Heads = White coin + Black CR • Tails = Black coin + White CR</p>

<div class="scene">
  <div class="coin" id="coin">
    <div class="face heads" id="headsFace">
      <img src="cr-black.png">
    </div>

    <div class="face tails" id="tailsFace">
      <img src="cr-white.png">
    </div>
  </div>
</div>

<button onclick="flipCoin()">Flip</button>
<button onclick="resetCoin()">Reset</button>

<p id="result">Ready.</p>

<script>
let audioCtx;

function getAudio(){
  if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playWhoosh(){
  const ctx=getAudio();
  const buffer=ctx.createBuffer(1,ctx.sampleRate,ctx.sampleRate);
  const data=buffer.getChannelData(0);
  for(let i=0;i<data.length;i++){
    data[i]=(Math.random()*2-1)*0.4;
  }
  const source=ctx.createBufferSource();
  source.buffer=buffer;
  const gain=ctx.createGain();
  gain.gain.setValueAtTime(0.0001,ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.3,ctx.currentTime+.1);
  gain.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+1);
  source.connect(gain).connect(ctx.destination);
  source.start();
}

function playClink(){
  const ctx=getAudio();
  const osc=ctx.createOscillator();
  const gain=ctx.createGain();
  osc.type="triangle";
  osc.frequency.setValueAtTime(900,ctx.currentTime);
  gain.gain.setValueAtTime(0.0001,ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.3,ctx.currentTime+.02);
  gain.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+.15);
  osc.connect(gain).connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime+.15);
}

let spin=0;

function flipCoin(){
  const ctx=getAudio();
  if(ctx.state==="suspended") ctx.resume();

  const coin=document.getElementById("coin");
  const heads=document.getElementById("headsFace");
  const tails=document.getElementById("tailsFace");
  const result=document.getElementById("result");

  heads.classList.remove("glow-white");
  tails.classList.remove("glow-blue");

  playWhoosh();

  const outcome=Math.random()<0.5?"heads":"tails";
  spin+=720;
  if(outcome==="tails") spin+=180;

  coin.style.transform="rotateY("+spin+"deg)";

  setTimeout(()=>{
    playClink();
    result.textContent="Result: "+outcome.toUpperCase()+" ✅";

    if(outcome==="heads"){
      heads.classList.add("glow-white");
    }else{
      tails.classList.add("glow-blue");
    }
  },2000);
}

function resetCoin(){
  document.getElementById("coin").style.transform="rotateY(0deg)";
  document.getElementById("headsFace").classList.remove("glow-white");
  document.getElementById("tailsFace").classList.remove("glow-blue");
  document.getElementById("result").textContent="Ready.";
}
</script>

</body>
</html>
