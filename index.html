<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CuRe Coin Flip</title>

<style>
  :root{
    --bg0:#050505;
    --bg1:#0b0b0b;
    --fg:#ffffff;
    --muted:rgba(255,255,255,.65);

    --coin:240px;
    --thickness:22px;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    min-height:100vh;
    display:grid;
    place-items:center;
    color:var(--fg);
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    background:
      radial-gradient(800px 500px at 50% 20%, rgba(255,255,255,.10), rgba(255,255,255,0) 55%),
      radial-gradient(900px 700px at 50% 70%, rgba(0,0,0,.65), rgba(0,0,0,0) 60%),
      linear-gradient(180deg, var(--bg0), var(--bg1));
    overflow:hidden;
  }

  /* Watermark drift animation */
  @keyframes driftLeft {
    0%   { background-position: 0px 0px; }
    100% { background-position: -900px 0px; }
  }

  /* Diagonal CR watermark overlay (whole page) */
  body::before{
    content:"";
    position:fixed;
    inset:-40%;
    background-image: url("cr-white.png");
    background-size: 140px 140px;
    background-repeat: repeat;
    background-position: 0 0;
    opacity: .06;
    transform: rotate(-25deg);
    filter: blur(.2px);
    pointer-events:none;
    animation: driftLeft 18s linear infinite;
  }

  /* Subtle diagonal stripe overlay */
  body::after{
    content:"";
    position:fixed;
    inset:0;
    background:
      repeating-linear-gradient(
        135deg,
        rgba(255,255,255,.07) 0px,
        rgba(255,255,255,.07) 2px,
        rgba(255,255,255,0) 2px,
        rgba(255,255,255,0) 18px
      );
    opacity:.12;
    pointer-events:none;
  }

  .wrap{
    width:min(900px, 92vw);
    text-align:center;
    padding:28px 0 40px;
    display:grid;
    justify-items:center;
    gap:14px;
    position:relative;
    z-index:1;
  }

  h1{
    margin:0;
    font-size:clamp(20px,3.2vw,28px);
    letter-spacing:.02em;
  }

  .sub{
    margin:0;
    color:var(--muted);
    font-size:14px;
  }

  .scene{
    perspective:1100px;
    width:var(--coin);
    height:var(--coin);
    margin:18px 0 6px;
    display:grid;
    place-items:center;
  }

  .coin{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform 2s cubic-bezier(.2,.85,.2,1);
    filter: drop-shadow(0 22px 34px rgba(0,0,0,.75));
  }

  .face{
    position:absolute;
    inset:0;
    border-radius:50%;
    display:grid;
    place-items:center;
    backface-visibility:hidden;
    border:1px solid rgba(255,255,255,.18);
    overflow:hidden;
  }

  /* Front (Heads): White + black logo */
  .heads{
    background:#ffffff;
    transform: rotateY(0deg) translateZ(calc(var(--thickness)/2));
  }

  /* Back (Tails): Black + white logo */
  .tails{
    background:#000000;
    transform: rotateY(180deg) translateZ(calc(var(--thickness)/2));
  }

  .face img{
    width:70%;
    height:70%;
    object-fit:contain;
    user-select:none;
    -webkit-user-drag:none;
  }

  /* ✅ FIX: Do NOT rotate the tails image.
     The face itself is already rotated; extra transforms can cause “double-flip” looking inverted. */
  .tails img{
    transform:none;
  }

  /* 3D edge */
  .edge{
    position:absolute;
    inset:0;
    border-radius:50%;
    transform-style:preserve-3d;
    pointer-events:none;
  }

  .edge::before{
    content:"";
    position:absolute;
    left:50%;
    top:50%;
    width: calc(var(--coin) - 10px);
    height: calc(var(--coin) - 10px);
    border-radius:50%;
    transform: translate(-50%,-50%) rotateX(90deg);
    background: repeating-linear-gradient(
      90deg,
      rgba(255,255,255,.26) 0px,
      rgba(255,255,255,.26) 2px,
      rgba(255,255,255,.12) 3px,
      rgba(255,255,255,.12) 7px
    );
    box-shadow:
      0 0 0 calc(var(--thickness)/2) rgba(255,255,255,.18) inset,
      0 0 0 var(--thickness) rgba(0,0,0,.55) inset;
    opacity:.95;
  }

  /* Winner glow pulse */
  @keyframes pulseWhite{
    0%{ box-shadow: 0 0 12px rgba(255,255,255,.55), 0 0 28px rgba(255,255,255,.25); }
    50%{ box-shadow: 0 0 30px rgba(255,255,255,.95), 0 0 80px rgba(255,255,255,.45); }
    100%{ box-shadow: 0 0 12px rgba(255,255,255,.55), 0 0 28px rgba(255,255,255,.25); }
  }
  @keyframes pulseBlue{
    0%{ box-shadow: 0 0 12px rgba(0,200,255,.55), 0 0 28px rgba(0,200,255,.25); }
    50%{ box-shadow: 0 0 30px rgba(0,200,255,.95), 0 0 80px rgba(0,200,255,.45); }
    100%{ box-shadow: 0 0 12px rgba(0,200,255,.55), 0 0 28px rgba(0,200,255,.25); }
  }

  .glow-heads{ animation: pulseWhite 1.5s infinite ease-in-out; }
  .glow-tails{ animation: pulseBlue  1.5s infinite ease-in-out; }

  .btns{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    margin-top:8px;
  }

  button{
    padding:10px 16px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.20);
    background: rgba(255,255,255,.06);
    color: var(--fg);
    font-weight:700;
    letter-spacing:.02em;
    cursor:pointer;
    transition: transform .08s ease, background .2s ease, border-color .2s ease;
  }
  button:hover{ background: rgba(255,255,255,.10); border-color: rgba(255,255,255,.30); }
  button:active{ transform: translateY(1px); }
  button:disabled{ opacity:.55; cursor:not-allowed; }

  .result{
    margin-top:8px;
    color:rgba(255,255,255,.78);
    min-height:22px;
    font-weight:700;
    letter-spacing:.01em;
  }

  .tiny{
    margin-top:4px;
    color:rgba(255,255,255,.45);
    font-size:12px;
  }

  /* ✅ Popup moved near bottom so it doesn’t cover the logo */
  .flash{
    position:fixed;
    left:0;
    right:0;
    bottom:150px;   /* move up/down here */
    display:grid;
    place-items:center;
    pointer-events:none;
    opacity:0;
    transform: translateY(12px) scale(.98);
    transition: opacity .15s ease, transform .15s ease;
    z-index:10;
  }
  .flash.show{
    opacity:1;
    transform: translateY(0) scale(1);
  }
  .flash .pill{
    padding:12px 18px;
    border-radius:999px;
    font-weight:900;
    letter-spacing:.12em;
    text-transform:uppercase;
    border:1px solid rgba(255,255,255,.25);
    background: rgba(0,0,0,.55);
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,.45);
    transform:none !important; /* ✅ prevents any accidental inversion */
  }
  .pill.heads{
    box-shadow: 0 0 24px rgba(255,255,255,.35), 0 10px 30px rgba(0,0,0,.45);
  }
  .pill.tails{
    box-shadow: 0 0 24px rgba(0,200,255,.35), 0 10px 30px rgba(0,0,0,.45);
  }

  /* Subtle camera shake */
  @keyframes shake {
    0%{ transform: translate(0,0); }
    20%{ transform: translate(-2px,1px); }
    40%{ transform: translate(2px,-1px); }
    60%{ transform: translate(-1px,-2px); }
    80%{ transform: translate(1px,2px); }
    100%{ transform: translate(0,0); }
  }
  .shake{
    animation: shake .22s linear 1;
  }

  @media (prefers-reduced-motion: reduce){
    body::before{ animation:none; }
    .coin{ transition:none; }
    .glow-heads,.glow-tails{ animation:none; }
  }
</style>
</head>

<body>
  <div class="flash" id="flash">
    <div class="pill" id="flashPill">HEADS</div>
  </div>

  <div class="wrap">
    <h1>Coin Flip</h1>
    <p class="sub">Heads or Tails</p>

    <div class="scene">
      <div class="coin" id="coin">
        <div class="face heads" id="headsFace">
          <img src="cr-black.png" alt="CuRe Heads">
        </div>

        <div class="face tails" id="tailsFace">
          <img src="cr-white.png" alt="CuRe Tails">
        </div>

        <div class="edge"></div>
      </div>
    </div>

    <div class="btns">
      <button id="flipBtn">Flip</button>
      <button id="resetBtn">Reset</button>
    </div>

    <div class="result" id="result">Ready.</div>
    <div class="tiny">CuRe • CoinFlip</div>
  </div>

<script>
  const coin = document.getElementById("coin");
  const headsFace = document.getElementById("headsFace");
  const tailsFace = document.getElementById("tailsFace");
  const flipBtn = document.getElementById("flipBtn");
  const resetBtn = document.getElementById("resetBtn");
  const result = document.getElementById("result");

  const flash = document.getElementById("flash");
  const flashPill = document.getElementById("flashPill");

  // ---- Sound ----
  let audioCtx;
  function ctx(){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function whoosh(){
    const c = ctx();
    const dur = 1.0;
    const buffer = c.createBuffer(1, c.sampleRate * dur, c.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<data.length;i++) data[i] = (Math.random()*2-1)*0.35;

    const src = c.createBufferSource();
    src.buffer = buffer;

    const gain = c.createGain();
    gain.gain.setValueAtTime(0.0001, c.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.25, c.currentTime + 0.07);
    gain.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur);

    src.connect(gain).connect(c.destination);
    src.start();
  }
  function clink(){
    const c = ctx();
    const t = c.currentTime;

    const osc = c.createOscillator();
    osc.type = "triangle";
    osc.frequency.setValueAtTime(900, t);
    osc.frequency.exponentialRampToValueAtTime(520, t + 0.09);

    const gain = c.createGain();
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(0.32, t + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.15);

    osc.connect(gain).connect(c.destination);
    osc.start(t);
    osc.stop(t + 0.16);
  }

  function clearGlow(){
    headsFace.classList.remove("glow-heads");
    tailsFace.classList.remove("glow-tails");
  }

  function showFlash(outcome){
    flashPill.textContent = outcome.toUpperCase();
    flashPill.classList.remove("heads","tails");
    flashPill.classList.add(outcome);
    flash.classList.add("show");
    setTimeout(()=> flash.classList.remove("show"), 650);
  }

  // Accurate flip math (no drift)
  let flipCount = 0;
  let busy = false;

  flipBtn.addEventListener("click", async () => {
    if (busy) return;
    busy = true;
    flipBtn.disabled = true;

    const c = ctx();
    if (c.state === "suspended") await c.resume();

    clearGlow();

    const outcome = Math.random() < 0.5 ? "heads" : "tails";

    result.textContent = "Flipping...";
    whoosh();

    flipCount++;
    const spins = 6 + (flipCount % 3);
    const target = (spins * 360) + (outcome === "tails" ? 180 : 0);
    coin.style.transform = `rotateY(${target}deg)`;

    setTimeout(() => {
      clink();
      coin.classList.add("shake");
      setTimeout(()=>coin.classList.remove("shake"), 250);

      result.textContent = `Result: ${outcome.toUpperCase()} ✅`;
      showFlash(outcome);

      if (outcome === "heads") headsFace.classList.add("glow-heads");
      else tailsFace.classList.add("glow-tails");

      busy = false;
      flipBtn.disabled = false;
    }, 2000);
  });

  resetBtn.addEventListener("click", () => {
    clearGlow();
    coin.style.transform = "rotateY(0deg)";
    result.textContent = "Ready.";
    flipCount = 0;
    busy = false;
    flipBtn.disabled = false;
  });
</script>

</body>
</html>
