<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CuRe Coin Flip</title>

<style>
:root{
  --bg:#0b0b0b;
  --fg:#ffffff;
  --muted:#a8a8a8;
  --coin-size:230px;
  --coin-thickness:18px;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  min-height:100vh;
  display:grid;
  place-items:center;
  background: radial-gradient(ellipse at 50% 30%, #151515 0%, var(--bg) 55%, #000 100%);
  color:var(--fg);
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
}

.wrap{
  width:min(900px,92vw);
  display:grid;
  justify-items:center;
  gap:18px;
  padding:28px 0 40px;
  text-align:center;
}

.title{ font-size:clamp(18px,3vw,24px); margin:0; }
.sub{ margin:0; color:var(--muted); font-size:14px; }

.stage{
  perspective:1200px;
  width:var(--coin-size);
  height:var(--coin-size);
  display:grid;
  place-items:center;
}

.coin{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition: transform 1.9s cubic-bezier(.2,.8,.2,1);
  transform: rotateY(0deg);
  filter: drop-shadow(0 20px 30px rgba(0,0,0,.6));
}

/* Base face */
.face{
  position:absolute;
  inset:0;
  border-radius:50%;
  display:grid;
  place-items:center;
  backface-visibility:hidden;
  border:2px solid rgba(255,255,255,.15);
}

/* HEADS - pure white */
.face.heads{
  background:#ffffff;
  transform: translateZ(calc(var(--coin-thickness) / 2));
}

/* TAILS - pure black */
.face.tails{
  background:#000000;
  transform: rotateY(180deg) translateZ(calc(var(--coin-thickness) / 2));
}

/* Prevent mirrored look */
.face.tails .logo{
  transform: scaleX(-1);
}

.logo{
  width:70%;
  height:70%;
  object-fit:contain;
  user-select:none;
  -webkit-user-drag:none;
}

/* 3D edge */
.edge{
  position:absolute;
  inset:0;
  border-radius:50%;
  transform-style:preserve-3d;
  pointer-events:none;
}

.edge::before{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  width: calc(var(--coin-size) - 10px);
  height: calc(var(--coin-size) - 10px);
  border-radius:50%;
  transform: translate(-50%, -50%) rotateX(90deg);
  box-shadow:
    0 0 0 calc(var(--coin-thickness) / 2) rgba(255,255,255,.2) inset,
    0 0 0 calc(var(--coin-thickness)) rgba(0,0,0,.5) inset;
  background: repeating-linear-gradient(
    90deg,
    rgba(255,255,255,.25) 0px,
    rgba(255,255,255,.25) 2px,
    rgba(255,255,255,.15) 3px,
    rgba(255,255,255,.15) 6px
  );
}

.btns{
  display:flex;
  gap:10px;
}

button{
  border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.06);
  color:var(--fg);
  padding:10px 14px;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
}

button:hover{
  background:rgba(255,255,255,.12);
}

.result{ margin-top:10px; color:var(--muted); }
.tag{ margin-top:8px; font-size:12px; color:rgba(255,255,255,.45); }

</style>
</head>

<body>
<div class="wrap">
  <h1 class="title">CuRe Clan — Tournament Coin Flip</h1>
  <p class="sub">Heads = White coin + Black CR • Tails = Black coin + White CR</p>

  <div class="stage">
    <div class="coin" id="coin">
      <div class="face heads">
        <img class="logo" src="cr-black.png" alt="CR Black Logo">
      </div>

      <div class="face tails">
        <img class="logo" src="cr-white.png" alt="CR White Logo">
      </div>

      <div class="edge"></div>
    </div>
  </div>

  <div class="btns">
    <button id="flipBtn">Flip</button>
    <button id="copyBtn">Copy Link</button>
    <button id="resetBtn">Reset</button>
  </div>

  <div class="result" id="result">Ready.</div>
  <div class="tag">Official CuRe Clan 50/50 tournament coin flip.</div>
</div>

<script>
const coin = document.getElementById("coin");
const flipBtn = document.getElementById("flipBtn");
const copyBtn = document.getElementById("copyBtn");
const resetBtn = document.getElementById("resetBtn");
const result = document.getElementById("result");

let spinning=false;
let spinCount=0;

/* ---- Sound ---- */
let audioCtx;
function getCtx(){
  if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playWhoosh(){
  const ctx=getCtx();
  const dur=1;
  const buffer=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate);
  const data=buffer.getChannelData(0);
  for(let i=0;i<data.length;i++){ data[i]=(Math.random()*2-1)*0.35; }

  const noise=ctx.createBufferSource();
  noise.buffer=buffer;

  const gain=ctx.createGain();
  gain.gain.setValueAtTime(0.0001,ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.2,ctx.currentTime+0.05);
  gain.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+dur);

  noise.connect(gain).connect(ctx.destination);
  noise.start();
}

function playClink(){
  const ctx=getCtx();
  const osc=ctx.createOscillator();
  const gain=ctx.createGain();
  osc.type="triangle";
  osc.frequency.setValueAtTime(800,ctx.currentTime);
  gain.gain.setValueAtTime(0.0001,ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.3,ctx.currentTime+0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.15);
  osc.connect(gain).connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime+0.15);
}

/* ---- Flip Logic ---- */
flipBtn.addEventListener("click",async()=>{
  if(spinning)return;
  spinning=true;
  flipBtn.disabled=true;

  const ctx=getCtx();
  if(ctx.state==="suspended") await ctx.resume();

  const outcome=Math.random()<0.5?"heads":"tails";
  result.textContent="Flipping...";
  playWhoosh();

  spinCount+=7;
  const endDeg=(spinCount*360)+(outcome==="tails"?180:0);
  coin.style.transform=`rotateY(${endDeg}deg)`;

  setTimeout(()=>{
    playClink();
    result.textContent=`Result: ${outcome.charAt(0).toUpperCase()+outcome.slice(1)} ✅`;
    flipBtn.disabled=false;
    spinning=false;
  },2000);
});

copyBtn.addEventListener("click",async()=>{
  await navigator.clipboard.writeText(location.href);
  result.textContent="Link copied ✅";
});

resetBtn.addEventListener("click",()=>{
  coin.style.transform="rotateY(0deg)";
  result.textContent="Ready.";
});
</script>
</body>
</html>
