<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CuRe Coin Flip</title>

  <style>
    :root {
      --bg:#0b0b0b;
      --fg:#ffffff;
      --muted:#a8a8a8;
      --coin-size:220px;
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background: radial-gradient(ellipse at 50% 30%, #151515 0%, var(--bg) 55%, #000 100%);
      color:var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }

    .wrap {
      width:min(900px,92vw);
      display:grid;
      justify-items:center;
      gap:18px;
      padding:28px 0 40px;
      text-align:center;
    }

    .title {
      font-size:clamp(18px,3vw,24px);
      letter-spacing:.02em;
      margin:0;
    }

    .sub {
      margin:0;
      color:var(--muted);
      font-size:14px;
    }

    .stage {
      perspective:1000px;
      width:var(--coin-size);
      height:var(--coin-size);
      display:grid;
      place-items:center;
      margin-top:10px;
    }

    .coin {
      width:100%;
      height:100%;
      position:relative;
      transform-style:preserve-3d;
      transform:rotateY(0deg);
      transition:transform 1.9s cubic-bezier(.2,.8,.2,1);
      filter: drop-shadow(0 18px 24px rgba(0,0,0,.55));
    }

    .face {
      position:absolute;
      inset:0;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.12);
      display:grid;
      place-items:center;
      backface-visibility:hidden;
      overflow:hidden;
      background: radial-gradient(circle at 40% 35%, #141414 0%, #080808 60%, #050505 100%);
    }

    .face.tails {
      transform:rotateY(180deg);
    }

    .logo {
      width:70%;
      height:70%;
      object-fit:contain;
      user-select:none;
      -webkit-user-drag:none;
    }

    .rim {
      position:absolute;
      inset:-8px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.16);
      pointer-events:none;
      box-shadow: inset 0 0 0 10px rgba(255,255,255,.03);
    }

    .btns {
      display:flex;
      gap:10px;
      margin-top:6px;
      flex-wrap:wrap;
      justify-content:center;
    }

    button {
      appearance:none;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.06);
      color:var(--fg);
      padding:10px 14px;
      border-radius:12px;
      cursor:pointer;
      font-weight:600;
      letter-spacing:.02em;
      transition:transform .08s ease, background .2s ease, border-color .2s ease;
    }

    button:hover {
      background:rgba(255,255,255,.10);
      border-color:rgba(255,255,255,.28);
    }

    button:active {
      transform: translateY(1px) scale(.99);
    }

    button:disabled {
      opacity:.55;
      cursor:not-allowed;
    }

    .result {
      min-height:22px;
      margin:6px 0 0;
      font-size:15px;
      color:var(--muted);
    }

    .tag {
      margin-top:8px;
      font-size:12px;
      color:rgba(255,255,255,.45);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1 class="title">CuRe Clan — Tournament Coin Flip</h1>
    <p class="sub">Heads = White CR • Tails = Black CR</p>

    <div class="stage">
      <div class="coin" id="coin">
        <div class="face heads">
          <img class="logo" src="cr-white.png" alt="CR White Logo">
          <div class="rim"></div>
        </div>
        <div class="face tails">
          <img class="logo" src="cr-black.png" alt="CR Black Logo">
          <div class="rim"></div>
        </div>
      </div>
    </div>

    <div class="btns">
      <button id="flipBtn">Flip</button>
      <button id="copyBtn">Copy Link</button>
      <button id="resetBtn">Reset</button>
    </div>

    <div class="result" id="result">Ready.</div>
    <div class="tag">
      Official CuRe Clan 50/50 tournament coin flip.
    </div>
  </div>

  <script>
    const coin = document.getElementById("coin");
    const flipBtn = document.getElementById("flipBtn");
    const copyBtn = document.getElementById("copyBtn");
    const resetBtn = document.getElementById("resetBtn");
    const result = document.getElementById("result");

    let spinning = false;
    let spinCount = 0;

    function capitalize(s){
      return s.charAt(0).toUpperCase() + s.slice(1);
    }

    function setOutcome(outcome){
      const baseSpins = 6;
      spinCount += 1;
      const extra = baseSpins + (spinCount % 3);
      const endDeg = (extra * 360) + (outcome === "tails" ? 180 : 0);

      coin.style.transform = `rotateY(${endDeg}deg)`;

      const url = new URL(location.href);
      url.searchParams.set("r", outcome);
      history.replaceState({}, "", url);
    }

    flipBtn.addEventListener("click", () => {
      if (spinning) return;

      spinning = true;
      flipBtn.disabled = true;

      const outcome = Math.random() < 0.5 ? "heads" : "tails";

      result.textContent = "Flipping...";
      setOutcome(outcome);

      setTimeout(() => {
        result.textContent = `Result: ${capitalize(outcome)} ✅`;
        spinning = false;
        flipBtn.disabled = false;
      }, 2000);
    });

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(location.href);
        result.textContent = "Link copied ✅";
      } catch {
        result.textContent = "Copy failed. Copy URL manually.";
      }
    });

    resetBtn.addEventListener("click", () => {
      const url = new URL(location.href);
      url.searchParams.delete("r");
      history.replaceState({}, "", url);
      coin.style.transform = "rotateY(0deg)";
      result.textContent = "Ready.";
    });
  </script>
</body>
</html>
