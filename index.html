<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CuRe Coin Flip</title>

  <style>
    :root{
      --bg:#0b0b0b;
      --fg:#ffffff;
      --muted:#a8a8a8;

      --coin-size:230px;
      --coin-thickness:18px; /* increase for thicker 3D (try 22px) */
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background: radial-gradient(ellipse at 50% 30%, #151515 0%, var(--bg) 55%, #000 100%);
      color:var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }

    .wrap{
      width:min(900px,92vw);
      display:grid;
      justify-items:center;
      gap:18px;
      padding:28px 0 40px;
      text-align:center;
    }

    .title{ font-size:clamp(18px,3vw,24px); letter-spacing:.02em; margin:0; }
    .sub{ margin:0; color:var(--muted); font-size:14px; }

    .stage{
      perspective:1200px;
      width:var(--coin-size);
      height:var(--coin-size);
      display:grid;
      place-items:center;
      margin-top:10px;
    }

    .coin{
      width:100%;
      height:100%;
      position:relative;
      transform-style:preserve-3d;
      transform: rotateY(0deg);
      transition: transform 1.9s cubic-bezier(.2,.8,.2,1);
      filter: drop-shadow(0 18px 28px rgba(0,0,0,.60));
    }

    /* Base face */
    .face{
      position:absolute;
      inset:0;
      border-radius:50%;
      display:grid;
      place-items:center;
      overflow:hidden;
      backface-visibility:hidden;
      border: 2px solid rgba(255,255,255,.14);
    }

    /* HEADS: White background + black logo */
    .face.heads{
      transform: translateZ(calc(var(--coin-thickness) / 2));
      background:
        radial-gradient(circle at 35% 30%, rgba(0,0,0,.12) 0%, rgba(0,0,0,0) 45%),
        radial-gradient(circle at 60% 70%, rgba(0,0,0,.20) 0%, rgba(0,0,0,0) 55%),
        radial-gradient(circle at 40% 35%, #ffffff 0%, #ededed 60%, #d7d7d7 100%);
    }

    /* TAILS: Black background + white logo */
    .face.tails{
      transform: rotateY(180deg) translateZ(calc(var(--coin-thickness) / 2));
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,.12) 0%, rgba(255,255,255,0) 45%),
        radial-gradient(circle at 60% 70%, rgba(0,0,0,.45) 0%, rgba(0,0,0,0) 55%),
        radial-gradient(circle at 40% 35%, #151515 0%, #0a0a0a 60%, #050505 100%);
    }

    .logo{
      width:70%;
      height:70%;
      object-fit:contain;
      user-select:none;
      -webkit-user-drag:none;
      filter: drop-shadow(0 8px 10px rgba(0,0,0,.45));
    }

    /* Slightly different shadow on the white side so it looks crisp */
    .face.heads .logo{
      filter: drop-shadow(0 6px 8px rgba(0,0,0,.28));
    }

    /* Coin edge (3D thickness) */
    .edge{
      position:absolute;
      inset:0;
      border-radius:50%;
      transform-style:preserve-3d;
      pointer-events:none;
    }

    /* Cylinder-style edge with ridges */
    .edge::before{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width: calc(var(--coin-size) - 10px);
      height: calc(var(--coin-size) - 10px);
      border-radius:50%;
      transform: translate(-50%, -50%) rotateX(90deg);
      box-shadow:
        0 0 0 calc(var(--coin-thickness) / 2) rgba(255,255,255,.12) inset,
        0 0 0 calc(var(--coin-thickness)) rgba(0,0,0,.45) inset;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.22) 0px,
          rgba(255,255,255,.22) 2px,
          rgba(255,255,255,.10) 3px,
          rgba(255,255,255,.10) 6px
        );
      opacity:.95;
      filter: blur(.2px);
    }

    /* Rim shine */
    .rim{
      position:absolute;
      inset:-7px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.16);
      box-shadow:
        inset 0 0 0 10px rgba(255,255,255,.03),
        0 0 24px rgba(255,255,255,.03);
      pointer-events:none;
    }

    .btns{
      display:flex;
      gap:10px;
      margin-top:6px;
      flex-wrap:wrap;
      justify-content:center;
    }

    button{
      appearance:none;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.06);
      color:var(--fg);
      padding:10px 14px;
      border-radius:12px;
      cursor:pointer;
      font-weight:600;
      letter-spacing:.02em;
      transition:transform .08s ease, background .2s ease, border-color .2s ease;
    }
    button:hover{ background:rgba(255,255,255,.10); border-color:rgba(255,255,255,.28); }
    button:active{ transform: translateY(1px) scale(.99); }
    button:disabled{ opacity:.55; cursor:not-allowed; }

    .result{ min-height:22px; margin:6px 0 0; font-size:15px; color:var(--muted); }
    .tag{ margin-top:8px; font-size:12px; color:rgba(255,255,255,.45); }
  </style>
</head>

<body>
  <div class="wrap">
    <h1 class="title">CuRe Clan — Tournament Coin Flip</h1>
    <p class="sub">Heads = White coin + Black CR • Tails = Black coin + White CR</p>

    <div class="stage">
      <div class="coin" id="coin">
        <!-- HEADS: white background + black CR -->
        <div class="face heads">
          <img class="logo" src="cr-black.png" alt="CR Black Logo">
          <div class="rim"></div>
        </div>

        <!-- TAILS: black background + white CR -->
        <div class="face tails">
          <img class="logo" src="cr-white.png" alt="CR White Logo">
          <div class="rim"></div>
        </div>

        <div class="edge"></div>
      </div>
    </div>

    <div class="btns">
      <button id="flipBtn">Flip</button>
      <button id="copyBtn">Copy Link</button>
      <button id="resetBtn">Reset</button>
    </div>

    <div class="result" id="result">Ready.</div>
    <div class="tag">Official CuRe Clan 50/50 tournament coin flip.</div>
  </div>

  <script>
    const coin = document.getElementById("coin");
    const flipBtn = document.getElementById("flipBtn");
    const copyBtn = document.getElementById("copyBtn");
    const resetBtn = document.getElementById("resetBtn");
    const result = document.getElementById("result");

    let spinning = false;
    let spinCount = 0;

    function cap(s){ return s.charAt(0).toUpperCase() + s.slice(1); }

    // ---- Sound (no file needed) ----
    let audioCtx;
    function getAudioCtx(){
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playWhoosh(durationMs=900){
      const ctx = getAudioCtx();
      const dur = durationMs / 1000;

      const bufferSize = Math.floor(ctx.sampleRate * dur);
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i=0;i<bufferSize;i++){
        data[i] = (Math.random() * 2 - 1) * 0.35;
      }

      const noise = ctx.createBufferSource();
      noise.buffer = buffer;

      const filter = ctx.createBiquadFilter();
      filter.type = "bandpass";
      filter.frequency.setValueAtTime(700, ctx.currentTime);
      filter.frequency.exponentialRampToValueAtTime(1400, ctx.currentTime + dur);

      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.20, ctx.currentTime + 0.06);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);

      noise.connect(filter).connect(gain).connect(ctx.destination);
      noise.start();
      noise.stop(ctx.currentTime + dur);
    }

    function playClink(){
      const ctx = getAudioCtx();
      const t = ctx.currentTime;

      const osc = ctx.createOscillator();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(880, t);
      osc.frequency.exponentialRampToValueAtTime(520, t + 0.08);

      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.35, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.14);

      const hp = ctx.createBiquadFilter();
      hp.type = "highpass";
      hp.frequency.setValueAtTime(300, t);

      osc.connect(hp).connect(gain).connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.16);

      const clickOsc = ctx.createOscillator();
      clickOsc.type = "square";
      clickOsc.frequency.setValueAtTime(120, t);

      const clickGain = ctx.createGain();
      clickGain.gain.setValueAtTime(0.0001, t);
      clickGain.gain.exponentialRampToValueAtTime(0.12, t + 0.005);
      clickGain.gain.exponentialRampToValueAtTime(0.0001, t + 0.03);

      clickOsc.connect(clickGain).connect(ctx.destination);
      clickOsc.start(t);
      clickOsc.stop(t + 0.04);
    }

    function setOutcome(outcome){
      const baseSpins = 7;
      spinCount += 1;
      const extra = baseSpins + (spinCount % 3);
      const endDeg = (extra * 360) + (outcome === "tails" ? 180 : 0);

      coin.style.transform = `rotateY(${endDeg}deg)`;

      const url = new URL(location.href);
      url.searchParams.set("r", outcome);
      history.replaceState({}, "", url);
    }

    flipBtn.addEventListener("click", async () => {
      if (spinning) return;

      const ctx = getAudioCtx();
      if (ctx.state === "suspended") await ctx.resume();

      spinning = true;
      flipBtn.disabled = true;

      const outcome = Math.random() < 0.5 ? "heads" : "tails";

      result.textContent = "Flipping...";
      playWhoosh(1100);
      setOutcome(outcome);

      setTimeout(() => {
        playClink();
        result.textContent = `Result: ${cap(outcome)} ✅`;
        spinning = false;
        flipBtn.disabled = false;
      }, 2000);
    });

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(location.href);
        result.textContent = "Link copied ✅";
      } catch {
        result.textContent = "Copy failed. Copy URL manually.";
      }
    });

    resetBtn.addEventListener("click", () => {
      const url = new URL(location.href);
      url.searchParams.delete("r");
      history.replaceState({}, "", url);
      coin.style.transform = "rotateY(0deg)";
      result.textContent = "Ready.";
    });
  </script>
</body>
</html>
