<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CuRe Coin Flip</title>

  <style>
    :root{
      --bg:#0b0b0b;
      --fg:#ffffff;
      --muted:#a8a8a8;

      --coin-size:230px;
      --coin-thickness:22px; /* try 22px for thicker */
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background: radial-gradient(ellipse at 50% 30%, #151515 0%, var(--bg) 55%, #000 100%);
      color:var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }

    .wrap{
      width:min(900px,92vw);
      display:grid;
      justify-items:center;
      gap:18px;
      padding:28px 0 40px;
      text-align:center;
    }

    .title{ font-size:clamp(18px,3vw,24px); margin:0; letter-spacing:.02em; }
    .sub{ margin:0; color:var(--muted); font-size:14px; }

    .stage{
      perspective:1200px;
      width:var(--coin-size);
      height:var(--coin-size);
      display:grid;
      place-items:center;
      margin-top:8px;
    }

    .coin{
      width:100%;
      height:100%;
      position:relative;
      transform-style:preserve-3d;
      transform: rotateY(0deg);
      transition: transform 1.9s cubic-bezier(.2,.8,.2,1);
      filter: drop-shadow(0 20px 30px rgba(0,0,0,.60));
    }

    /* Base face */
    .face{
      position:absolute;
      inset:0;
      border-radius:50%;
      display:grid;
      place-items:center;
      overflow:hidden;
      backface-visibility:hidden;
      border:2px solid rgba(255,255,255,.18);
      transition: box-shadow .25s ease;
    }

    /* HEADS (FRONT): WHITE background */
    .face.heads{
      background:#ffffff;
      transform: translateZ(calc(var(--coin-thickness) / 2));
    }

    /* TAILS (BACK): BLACK background */
    .face.tails{
      background:#000000;
      transform: rotateY(180deg) translateZ(calc(var(--coin-thickness) / 2));
    }

    .logo{
      width:70%;
      height:70%;
      object-fit:contain;
      user-select:none;
      -webkit-user-drag:none;
    }

    /* Back face is rotated 180deg, so the image appears mirrored.
       Flip it back so it reads normally. */
    .face.tails .logo{
      transform: scaleX(-1);
    }

    /* 3D edge ring */
    .edge{
      position:absolute;
      inset:0;
      border-radius:50%;
      transform-style:preserve-3d;
      pointer-events:none;
    }

    .edge::before{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width: calc(var(--coin-size) - 10px);
      height: calc(var(--coin-size) - 10px);
      border-radius:50%;
      transform: translate(-50%, -50%) rotateX(90deg);
      box-shadow:
        0 0 0 calc(var(--coin-thickness) / 2) rgba(255,255,255,.18) inset,
        0 0 0 calc(var(--coin-thickness)) rgba(0,0,0,.55) inset;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.25) 0px,
          rgba(255,255,255,.25) 2px,
          rgba(255,255,255,.13) 3px,
          rgba(255,255,255,.13) 6px
        );
      opacity:.95;
      filter: blur(.2px);
    }

    /* ---- PULSE GLOWS (visible) ---- */
    @keyframes pulseWhite {
      0% {
        box-shadow:
          0 0 10px rgba(255,255,255,.65),
          0 0 26px rgba(255,255,255,.35),
          0 0 50px rgba(255,255,255,.15);
      }
      50% {
        box-shadow:
          0 0 22px rgba(255,255,255,.95),
          0 0 55px rgba(255,255,255,.60),
          0 0 110px rgba(255,255,255,.25);
      }
      100% {
        box-shadow:
          0 0 10px rgba(255,255,255,.65),
          0 0 26px rgba(255,255,255,.35),
          0 0 50px rgba(255,255,255,.15);
      }
    }

    @keyframes pulseBlue {
      0% {
        box-shadow:
          0 0 10px rgba(0,190,255,.60),
          0 0 26px rgba(0,190,255,.32),
          0 0 50px rgba(0,190,255,.14);
      }
      50% {
        box-shadow:
          0 0 22px rgba(0,190,255,.95),
          0 0 55px rgba(0,190,255,.55),
          0 0 110px rgba(0,190,255,.22);
      }
      100% {
        box-shadow:
          0 0 10px rgba(0,190,255,.60),
          0 0 26px rgba(0,190,255,.32),
          0 0 50px rgba(0,190,255,.14);
      }
    }

    .face.glow-heads{ animation: pulseWhite 1.6s infinite ease-in-out; }
    .face.glow-tails{ animation: pulseBlue  1.6s infinite ease-in-out; }

    .btns{
      display:flex;
      gap:10px;
      margin-top:6px;
      flex-wrap:wrap;
      justify-content:center;
    }

    button{
      appearance:none;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.06);
      color:var(--fg);
      padding:10px 14px;
      border-radius:12px;
      cursor:pointer;
      font-weight:600;
      letter-spacing:.02em;
    }
    button:hover{ background:rgba(255,255,255,.10); border-color:rgba(255,255,255,.28); }
    button:disabled{ opacity:.55; cursor:not-allowed; }

    .result{ min-height:22px; margin:6px 0 0; font-size:15px; color:var(--muted); }
    .tag{ margin-top:8px; font-size:12px; color:rgba(255,255,255,.45); }
  </style>
</head>

<body>
  <div class="wrap">
    <h1 class="title">CuRe Clan — Tournament Coin Flip</h1>
    <p class="sub">✅ UPDATE TEST — if you see this, the site updated</p>

    <div class="stage">
      <div class="coin" id="coin">
        <!-- FRONT (HEADS): white bg + black logo -->
        <div class="face heads" id="headsFace">
          <img class="logo" src="cr-black.png" alt="CR Black Logo">
        </div>

        <!-- BACK (TAILS): black bg + white logo -->
        <div class="face tails" id="tailsFace">
          <img class="logo" src="cr-white.png" alt="CR White Logo">
        </div>

        <div class="edge"></div>
      </div>
    </div>

    <div class="btns">
      <button id="flipBtn">Flip</button>
      <button id="copyBtn">Copy Link</button>
      <button id="resetBtn">Reset</button>
    </div>

    <div class="result" id="result">Ready.</div>
    <div class="tag">Official CuRe Clan 50/50 tournament coin flip.</div>
  </div>

  <script>
    const coin = document.getElementById("coin");
    const flipBtn = document.getElementById("flipBtn");
    const copyBtn = document.getElementById("copyBtn");
    const resetBtn = document.getElementById("resetBtn");
    const result = document.getElementById("result");
    const headsFace = document.getElementById("headsFace");
    const tailsFace = document.getElementById("tailsFace");

    let spinning = false;
    let spinCount = 0;

    // ---- Sound (no files needed) ----
    let audioCtx;
    function getAudioCtx(){
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playWhoosh(durationMs=1000){
      const ctx = getAudioCtx();
      const dur = durationMs / 1000;

      const bufferSize = Math.floor(ctx.sampleRate * dur);
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i=0;i<bufferSize;i++) data[i] = (Math.random() * 2 - 1) * 0.35;

      const noise = ctx.createBufferSource();
      noise.buffer = buffer;

      const filter = ctx.createBiquadFilter();
      filter.type = "bandpass";
      filter.frequency.setValueAtTime(700, ctx.currentTime);
      filter.frequency.exponentialRampToValueAtTime(1400, ctx.currentTime + dur);

      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.20, ctx.currentTime + 0.06);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);

      noise.connect(filter).connect(gain).connect(ctx.destination);
      noise.start();
      noise.stop(ctx.currentTime + dur);
    }

    function playClink(){
      const ctx = getAudioCtx();
      const t = ctx.currentTime;

      const osc = ctx.createOscillator();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(880, t);
      osc.frequency.exponentialRampToValueAtTime(520, t + 0.08);

      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.35, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.14);

      osc.connect(gain).connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.16);
    }

    function cap(s){ return s.charAt(0).toUpperCase() + s.slice(1); }

    function clearGlow(){
      headsFace.classList.remove("glow-heads");
      tailsFace.classList.remove("glow-tails");
    }

    flipBtn.addEventListener("click", async () => {
      if (spinning) return;

      const ctx = getAudioCtx();
      if (ctx.state === "suspended") await ctx.resume();

      spinning = true;
      flipBtn.disabled = true;
      clearGlow();

      const outcome = Math.random() < 0.5 ? "heads" : "tails";

      result.textContent = "Flipping...";
      playWhoosh(1100);

      // Lots of spins; end on correct side.
      const baseSpins = 7;
      spinCount += 1;
      const extra = baseSpins + (spinCount % 3);
      const endDeg = (extra * 360) + (outcome === "tails" ? 180 : 0);
      coin.style.transform = `rotateY(${endDeg}deg)`;

      setTimeout(() => {
        playClink();
        result.textContent = `Result: ${cap(outcome)} ✅`;

        if (outcome === "heads") headsFace.classList.add("glow-heads");
        else tailsFace.classList.add("glow-tails");

        spinning = false;
        flipBtn.disabled = false;
      }, 2000);
    });

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(location.href);
        result.textContent = "Link copied ✅";
      } catch {
        result.textContent = "Couldn’t copy — copy the URL manually.";
      }
    });

    resetBtn.addEventListener("click", () => {
      coin.style.transform = "rotateY(0deg)";
      clearGlow();
      result.textContent = "Ready.";
    });
  </script>
</body>
</html>
